# Frontend Vite en contenedor (Compose sin soporte "profiles" en versiones antiguas).
# Uso desde la raíz del proyecto:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d vite
# La API FastAPI debe estar en el host en el puerto 8000 (uvicorn).
#
# node_modules vive en ./frontend/node_modules (mismo bind que el código). Así no queda un
# volumen Docker obsoleto ocultando dependencias nuevas (p. ej. leaflet).
# Si es la primera vez: docker compose ... run --rm vite sh -c "cd /app && npm install"
# o ejecute npm install en frontend en el host antes de levantar el servicio.
version: '3.3'

services:
  vite:
    image: node:20-alpine
    container_name: seroptrans_vite
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      SEROPTRANS_API_PROXY: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
