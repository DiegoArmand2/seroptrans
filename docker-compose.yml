version: '3.3'

services:
  db:
    image: postgres:16-alpine
    container_name: seroptrans_db
    environment:
      POSTGRES_USER: seroptrans
      POSTGRES_PASSWORD: seroptrans_dev
      POSTGRES_DB: seroptrans
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seroptrans -d seroptrans"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: seroptrans_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seroptrans.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
