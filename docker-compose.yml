version: '3.3'

services:
  db:
    image: postgres:16-alpine
    container_name: seroptrans_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seroptrans_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      # Valor por defecto si .env no define la variable (evita 503 por webhook vacío)
      N8N_HORARIOS_WEBHOOK_URL: ${N8N_HORARIOS_WEBHOOK_URL:-https://n8nadm.admagentes.online/webhook/st_horarios}
      N8N_ROUTES1OF3_WEBHOOK_URL: ${N8N_ROUTES1OF3_WEBHOOK_URL:-https://n8nadm.admagentes.online/webhook/routes1of3}
      HORARIOS_UPLOAD_DIR: /app/uploads/horarios
      # Máx. espera al webhook n8n (segundos); debe ser ≥ timeout del frontend (5 min = 300).
      N8N_WEBHOOK_TIMEOUT_SECONDS: ${N8N_WEBHOOK_TIMEOUT_SECONDS:-300}
    ports:
      - "8000:8000"
    volumes:
      - horarios_uploads:/app/uploads/horarios
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Literal embebido en el build de Vite: el navegador del usuario debe poder abrir esta URL.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
        VITE_METABASE_DASHBOARD_URL: ${VITE_METABASE_DASHBOARD_URL:-}
    container_name: seroptrans_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  horarios_uploads:
